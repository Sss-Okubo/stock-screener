name: Weekly Stock Screening

on:
  schedule:
    # 毎週土曜 07:00 JST (金曜 22:00 UTC) — 日米両市場の週末後に実行
    - cron: "0 22 * * 5"
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data
          key: stock-db-${{ github.run_id }}
          restore-keys: stock-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m screener run

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/*.md

      - name: Commit report to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet || git commit -m "chore: add screening report $(date +%F)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
